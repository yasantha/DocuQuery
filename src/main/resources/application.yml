spring:
  application:
    name: docuquery
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/docuquery}
    username: ${SPRING_DATASOURCE_USERNAME:docuquery}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

openai:
  api-key: ${OPENAI_API_KEY:}
  embedding-model: text-embedding-3-small
  embedding-dimensions: 1536
  base-url: https://api.openai.com
  timeout-seconds: 30

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-sonnet-4-6
  base-url: https://api.anthropic.com
  max-tokens: 1024
  timeout-seconds: 60

rag:
  chunk-size: 500
  chunk-overlap: 50
  top-k-results: 5
  max-batch-size: 100

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
